overlay: 1.0.0
info:
  title: Overlay for injecting examples into the Registration API specfiication
  version: 1.0.0
extends: '/openapi_registration_v1.yaml'
actions:
  - target: '$' # Root of document
    update:
      paths:
        /registrations/{id}/score:
          put:
            parameters:
              - name: id
                in: path
                description: ID of specification that needs to be updated
                required: true
                schema:
                  type: string
                examples:
                  scorecard:
                    value: '123'
                  invalid-specification-not-found:
                    value: 'not-found'
            responses:
              "200":
                content:
                  application/json:
                    examples:
                      scorecard:
                        $ref: '#/components/examples/scorecard'
              "422":
                content:
                  application/problem+json:
                    examples:
                      invalid-specification-not-found:
                        $ref: '#/components/examples/specification-invalid-not-found'

      components:
        examples:
          scorecard:
            description: "A scorecard for a scored candidate"
            value:
              score: 74
              grade: "A-"
              dimensions:
                - name: "FC - Foundational Compliance"
                  intent: "Base layer of spec validity and structural soundness"
                  score: 99
                  grade: "A+"
                - name: "SEC - Security"
                  intent: "Trust, risk posture, and security compliance."
                  score: 100
                  grade: "A+"
                - name: "DX - Developer Experience"
                  intent: "Clarity, completeness, and ingestion readiness for developers and tooling"
                  score: 66
                  grade: "B"
                - name: "ARAX - AI-Readiness & Agent Experience"
                  intent: "Semantic breadth, depth, and agent comprehension for AI systems."
                  score: 51
                  grade: "C-"
                - name: "AU - Agent Usability"
                  intent: "Functional utility, complexity comfort, and AI orchestration readiness."
                  score: 93
                  grade: "A+"
                - name: "AID - AI Discoverability"
                  intent: "Findability, semantic richness, and reasoning readiness."
                  score: 100
                  grade: "A+"

