overlay: 1.0.0
info:
  title: Overlay for injecting examples into the Registration API specfiication
  version: 1.0.0
extends: '/openapi_registration_v1.yaml'
actions:
  - target: '$' # Root of document
    update:
      paths:
        /registrations/{id}/component:
          put:
            parameters:
              - name: id
                in: path
                description: ID of specification that needs to be updated
                required: true
                schema:
                  type: string
                examples:
                  valid-component:
                    value: '123'
                  invalid-specification-not-found:
                    value: 'not-found'
                  invalid-component-missing-revision:
                    value: 'missing-revision'
                  invalid-component-malformed-revision:
                    value: 'malformed-revision'
            requestBody:
              content:
                application/json:
                  examples:
                    valid-component:
                      $ref: '#/components/examples/valid-component'
                    invalid-specification-not-found:
                      $ref: '#/components/examples/valid-component'
                    invalid-component-missing-revision:
                      $ref: '#/components/examples/invalid-component-missing-revision'
                    invalid-component-malformed-revision:
                      $ref: '#/components/examples/invalid-component-malformed-revision'
            responses:
              "204":
                x-microcks-refs:
                  - valid-component
              "400":
                content:
                  application/problem+json:
                    examples:
                      invalid-component-missing-revision:
                        $ref: '#/components/examples/component-invalid-missing-revision'
                      invalid-component-malformed-revision:
                        $ref: '#/components/examples/component-invalid-malformed-revision'
              "422":
                content:
                  application/problem+json:
                    examples:
                      invalid-specification-not-found:
                        $ref: '#/components/examples/specification-invalid-not-found'
      components:
        examples:
          valid-component:
            description: A valid component submission example from a local file
            value:
              name: 'my-component'
              revision: '1.0.0'

          invalid-component-missing-revision:
            description: An invalid component submission example from a local file
            value:
              name: 'my-component'

          invalid-component-malformed-revision:
            description: An invalid component submission example from a local file
            value:
              name: 'my-component'
              revision: '1.0.0-invalid'

          component-invalid-missing-revision:
            description: Representation of a 400 Bad Request response when the component submitted is invalid.
            value:
              type: https://problems-registry.smartbear.com/invalid-body-property-value
              status: 400
              title: Invalid Body Property Value
              detail: The request body contains an invalid body property value.

          component-invalid-malformed-revision:
            description: Representation of a 400 Bad Request response when the component submitted is invalid.
            value:
              type: https://problems-registry.smartbear.com/invalid-body-property-value
              status: 400
              title: Invalid Body Property Value
              detail: The request body contains an invalid body property value.
