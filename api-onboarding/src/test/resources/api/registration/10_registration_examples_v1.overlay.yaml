overlay: 1.0.0
info:
  title: Overlay for injecting examples into the Registration API specfiication
  version: 1.0.0
extends: '/openapi_registration_v1.yaml'
actions:
  - target: '$' # Root of document
    update:
      paths:
        /registrations:
          post:
            requestBody:
              content:
                application/json:
                  examples:
                    valid-candidate:
                      $ref: '#/components/examples/valid-candidate-uri'
                    scored-candidate:
                      $ref: '#/components/examples/scored-candidate-uri'
                    registered-candidate:
                      $ref: '#/components/examples/registered-candidate-uri'
                    rejected-candidate:
                      $ref: '#/components/examples/rejected-candidate-uri'
                    invalid-candidate-missing-uri:
                      $ref: '#/components/examples/invalid-candidate-missing-uri'
                    invalid-candidate-malformed-uri:
                      $ref: '#/components/examples/invalid-candidate-malformed-uri'
                    invalid-candidate-not-found-uri:
                      $ref: '#/components/examples/invalid-candidate-not-found-uri'
            responses:
              "200":
                content:
                  application/json:
                    examples:
                      valid-candidate:
                        $ref: '#/components/examples/candidate-validated'
                      scored-candidate:
                        $ref: '#/components/examples/candidate-scored'
              "201":
                content:
                  application/json:
                    examples:
                      registered-candidate:
                        $ref: '#/components/examples/candidate-registered'
              "400":
                content:
                  application/problem+json:
                    examples:
                      invalid-candidate-missing-uri:
                        $ref: '#/components/examples/candidate-invalid-missing-uri'
                      invalid-candidate-malformed-uri:
                        $ref: '#/components/examples/candidate-invalid-malformed-uri'
              "422":
                content:
                  application/problem+json:
                    examples:
                      invalid-candidate-not-found-uri:
                        $ref: '#/components/examples/candidate-invalid-not-found-uri'
                      rejected-candidate:
                        $ref: '#/components/examples/candidate-scored-too-low'
      components:
        examples:
          valid-candidate-uri:
            description: 'A valid candidate submission example from a local file'
            value:
              source: 'file:///src/test/resources/api/examples/openapi_valid_candidate.yaml'

          scored-candidate-uri:
            description: 'A valid candidate submission example from a local file'
            value:
              source: "file:///src/test/resources/api/examples/openapi_valid_candidate.yaml"

          registered-candidate-uri:
            description: "A valid candidate submission example from a local file"
            value:
              source: "file:///src/test/resources/api/examples/openapi_registered_candidate.yaml"

          rejected-candidate-uri:
            description: "A valid candidate submission example from a local file"
            value:
              source: "file:///src/test/resources/api/examples/openapi_rejected_candidate.yaml"

          invalid-candidate-missing-uri:
            description: A candidate submission with a missing URI
            value:
              source: ''

          invalid-candidate-malformed-uri:
            description: A candidate submission with a malformed URI
            value:
              source: 'malformed_uri'

          invalid-candidate-not-found-uri:
            description: A candidate submission with a URI that does not exist
            value:
              source: 'file:///not_found.yaml'

          candidate-validated:
            description: A valid candidate submission
            value:
              source: 'file:///src/test/resources/api/examples/openapi_valid_candidate.yaml'
              contract: OPENAPI_V31
              info:
                title: petstore
                description: A sample API for end-to-end test fixtures.
                version: v1
              metadata:
                name: petstore
                revision: 1.0.0
                bundleName: petstore
                productName: platform
              status: VALID

          candidate-scored:
            description: 'A valid candidate with a quality score'
            value:
              source: 'file:///src/test/resources/api/examples/openapi_scored_candidate.yaml'
              contract: OPENAPI_V31
              info:
                title: petstore
                description: A sample API for end-to-end test fixtures.
                version: v1
              metadata:
                name: petstore
                revision: 1.0.0
                bundleName: petstore
                productName: platform
              status: SCORED
              scorecard:
                score: 74
                grade: "A-"
                dimensions:
                  - name: "FC - Foundational Compliance"
                    intent: "Base layer of spec validity and structural soundness"
                    score: 99
                    grade: "A+"
                  - name: "SEC - Security"
                    intent: "Trust, risk posture, and security compliance"
                    score: 100
                    grade: "A+"
                  - name: "DX - Developer Experience"
                    intent: "Clarity, completeness, and ingestion readiness for developers and tooling"
                    score: 66
                    grade: "B"
                  - name: "MR - Mock Readiness"
                    intent: "Ease of creating mock servers"
                    score: 85
                    grade: "A+"

          candidate-registered:
            description: "A candidate that has been registered successfully"
            value:
              id: '123'
              source: "file:///src/test/resources/api/examples/openapi_registered_candidate.yaml"
              contract: OPENAPI_V31
              info:
                title: petstore
                description: A sample API for end-to-end test fixtures.
                version: v1
              metadata:
                name: petstore
                revision: 1.0.0
                bundleName: petstore
                productName: platform
              status: REGISTERED
              scorecard:
                score: 74
                grade: "A-"
                dimensions:
                  - name: "FC - Foundational Compliance"
                    intent: "Base layer of spec validity and structural soundness"
                    score: 99
                    grade: "A+"
                  - name: "SEC - Security"
                    intent: "Trust, risk posture, and security compliance."
                    score: 100
                    grade: "A+"
                  - name: "DX - Developer Experience"
                    intent: "Clarity, completeness, and ingestion readiness for developers and tooling"
                    score: 66
                    grade: "B"
                  - name: "ARAX - AI-Readiness & Agent Experience"
                    intent: "Semantic breadth, depth, and agent comprehension for AI systems."
                    score: 51
                    grade: "C-"
                  - name: "AU - Agent Usability"
                    intent: "Functional utility, complexity comfort, and AI orchestration readiness."
                    score: 93
                    grade: "A+"
                  - name: "AID - AI Discoverability"
                    intent: "Findability, semantic richness, and reasoning readiness."
                    score: 100
                    grade: "A+"

          candidate-invalid-missing-uri:
            description: A candidate that has been rejected due to missing URI
            value:
              type: https://problems-registry.smartbear.com/validation-error
              status: 400
              title: Validation Error
              detail: The request is invalid.

          candidate-invalid-malformed-uri:
            description: A candidate that has been rejected due to malformed URI
            value:
              type: https://problems-registry.smartbear.com/validation-error
              status: 400
              title: Validation Error
              detail: The request is invalid.

          candidate-invalid-not-found-uri:
            description: A candidate that has been rejected due to URI not found
            value:
              type: https://problems-registry.smartbear.com/validation-error
              status: 422
              title: Validation Error
              detail: The request is invalid.

          candidate-scored-too-low:
            description: A candidate that has been scored but rejected due to low score
            value:
              type: https://problems-registry.smartbear.com/validation-error
              status: 422
              title: Validation Error
              detail: The request is invalid.

          specification-invalid-not-found:
            description: Representation of an 422 Unprocessable Entity response when the specification ID provided does not exist
            value:
              type: https://problems-registry.smartbear.com/validation-error
              status: 422
              title: Validation Error
              detail: The request is invalid.
