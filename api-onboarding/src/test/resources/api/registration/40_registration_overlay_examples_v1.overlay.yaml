overlay: 1.0.0
info:
  title: Overlay for injecting examples into the Registration API specfiication
  version: 1.0.0
extends: '/openapi_registration_v1.yaml'
actions:
  - target: '$' # Root of document
    update:
      paths:
        /registrations/{id}/overlay:
          post:
            parameters:
              - name: id
                in: path
                description: ID of specification that needs to be updated
                required: true
                schema:
                  type: string
                examples:
                  valid-overlay:
                    value: '123'
                  invalid-specification-not-found:
                    value: 'not-found'
                  invalid-overlay-missing-uri:
                    value: 'missing-uri'
                  invalid-overlay-malformed-uri:
                    value: 'malformed-uri'
                  invalid-overlay-not-found:
                    value: 'overlay-not-found'
            requestBody:
              content:
                application/json:
                  examples:
                    valid-overlay:
                      $ref: '#/components/examples/valid-overlay-uri'
                    invalid-specification-not-found:
                      $ref: '#/components/examples/valid-overlay-uri'
                    invalid-overlay-missing-uri:
                      $ref: '#/components/examples/invalid-overlay-missing-uri'
                    invalid-overlay-malformed-uri:
                      $ref: '#/components/examples/invalid-overlay-malformed-uri'
                    invalid-overlay-not-found:
                      $ref: '#/components/examples/invalid-overlay-not-found-uri'
            responses:
              "201":
                content:
                  application/json:
                    examples:
                      valid-overlay:
                        $ref: '#/components/examples/specification-overlaid'
              "400":
                content:
                  application/problem+json:
                    examples:
                      invalid-overlay-missing-uri:
                        $ref: '#/components/examples/overlay-invalid-missing-uri'
                      invalid-overlay-malformed-uri:
                        $ref: '#/components/examples/overlay-invalid-malformed-uri'
              "422":
                content:
                  application/problem+json:
                    examples:
                      invalid-specification-not-found:
                        $ref: '#/components/examples/specification-invalid-not-found'
                      invalid-overlay-not-found:
                        $ref: '#/components/examples/overlay-invalid-not-found'

      components:
        examples:
          valid-overlay-uri:
            description: A valid overlay submission example from a local file
            value:
              source: 'file:///src/test/resources/api/examples/openapi_valid_overlay.yaml'

          invalid-overlay-missing-uri:
            description: An overlay submission with a missing URI
            value:
              source: ''

          invalid-overlay-malformed-uri:
            description: An overlay submission with a malformed URI
            value:
              source: 'malformed_uri'

          invalid-overlay-not-found-uri:
            description: An overlay submission with a URI that does not exist
            value:
              source: 'file:///not_found.yaml'

          overlay-invalid-missing-uri:
            description: An overlay that has been rejected due to missing URI
            value:
              type: https://problems-registry.smartbear.com/bad-request
              status: 400
              title: Validation Error
              detail: The request is invalid.

          overlay-invalid-malformed-uri:
            description: An overlay that has been rejected due to malformed URI
            value:
              type: https://problems-registry.smartbear.com/bad-request
              status: 400
              title: Validation Error
              detail: The request is invalid.

          overlay-invalid-not-found:
            description: An overlay that has been rejected due to URI not found
            value:
              type: https://problems-registry.smartbear.com/validation-error
              status: 422
              title: Validation Error
              detail: The request is invalid.

          specification-overlaid:
            description: A specification that has been overlaid successfully
            value:
              id: '456'

